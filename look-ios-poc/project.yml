name: LOOKPOC
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.look.poc
targets:
  LOOKPOC:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LOOKPOC
    info:
      path: LOOKPOC/Info.plist
      properties:
        CFBundleDisplayName: LOOK POC
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  LOOKPOC:
    build:
      targets:
        LOOKPOC: all
    run:
      config: Debug
    archive:
      config: Release
